name: Frontend Quality & Vercel Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: ./apps/web

      - name: Run ESLint
        run: pnpm run lint
        working-directory: ./apps/web

      - name: Run TypeScript Check
        run: pnpm run type-check
        working-directory: ./apps/web

      - name: Build Test
        run: pnpm run build
        working-directory: ./apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: "CI_MOCK_URL"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "CI_MOCK_KEY"
          NEXT_PUBLIC_PORTONE_STORE_ID: "CI_MOCK_STORE"
          NEXT_PUBLIC_PORTONE_CHANNEL_KEY: "CI_MOCK_CHANNEL"
